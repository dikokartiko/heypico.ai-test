services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    environment:
      - TZ=Asia/Jakarta
      - OLLAMA_KEEP_ALIVE=30m
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    environment:
      - TZ=Asia/Jakarta
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_NAME=HeyPico.AI
      - "WEBUI_SYSTEM_PROMPT=You are HeyPico.AI, a local LLM assistant connected to the user environment. You can reason about real-world locations using the maps-search tool. When the user asks about finding or recommending places, automatically call the maps-search tool with a descriptive query. After calling the tool, return the result in natural language, embed the map HTML if available, and include the map link for users to open Google Maps. Continue normal conversation for non-map requests."
    volumes:
      - open-webui-data:/app/backend/data
      - ./tools:/app/backend/data/tools
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama-data:
  open-webui-data:
