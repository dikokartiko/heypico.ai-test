services:
  maps-backend:
    build:
      context: ./be-express
    container_name: maps-backend
    restart: unless-stopped
    init: true
    command: ["node", "src/index.js"]
    environment:
      NODE_ENV: production
      PORT: 3001
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-90000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      MAPS_RATE_LIMIT_WINDOW_MS: ${MAPS_RATE_LIMIT_WINDOW_MS:-60000}
      MAPS_RATE_LIMIT_MAX_REQUESTS: ${MAPS_RATE_LIMIT_MAX_REQUESTS:-30}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_MAPS_EMBED_API_KEY: ${GOOGLE_MAPS_EMBED_API_KEY:-}
      GOOGLE_MAPS_TIMEOUT_MS: ${GOOGLE_MAPS_TIMEOUT_MS:-8000}
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/openapi.json",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    environment:
      - TZ=Asia/Jakarta
      - OLLAMA_KEEP_ALIVE=30m
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    environment:
      - TZ=Asia/Jakarta
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_NAME=HeyPico.AI
      - 'TOOL_SERVER_CONNECTIONS=[{"url":"http://maps-backend:3001","path":"openapi.json","type":"openapi","auth_type":"none","config":{"enable":true},"info":{"id":"maps-search","name":"Maps Search","description":"Google Maps search tool"}}]'
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      maps-backend:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  ollama-data:
  open-webui-data:
